<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="Demo to colorize from black to red each stroke 
of a Japanese or Chinese character using animCJK svg files">
<link rel="stylesheet" href="_css/withSelector.css" type="text/css">
<style>
.specificSelector
{
	margin:0.5em 0;
	padding:0;
	border:0;
}
#a
{
	width:16em;
	height:16em;
	border:1px solid #ccc;
	margin:0.5em 0 0 0;
	padding:0;
}
#a svg
{
	display:block;
}
pre
{
	border:1px solid #ccc;
	padding:0.125em;
	white-space:pre-wrap;
}
</style>
<title>AnimCJK Red</title>
<link rel="icon" type="image/svg+xml" href="../animCJKIcon.svg">
</head>
<body>
<h1>AnimCJK Red</h1>
<nav class="link">
<a href="https://github.com/parsimonhi/animCJK"><span>Download</span></a>
<a href="./"><span>Sample selector</span></a>
</nav>
<fieldset class="langSelector"></fieldset>
<fieldset class="dataSelector"></fieldset>
<fieldset class="specificSelector">
<label>Make blush: <input type="checkbox" name="red"></label>
</fieldset>
<figure id="a"></figure>
<details>
<summary>SVG code</summary>
<pre class="codeTag"></pre>
</details>
<fieldset class="charListSelector"></fieldset>
<footer>
<nav class="link">
<a href="#"><span>Top</span></a>
<a href="./"><span>Sample selector</span></a>
<a href="../licenses/COPYING.txt"><span>Licences</span></a>
</nav>
</footer>
<script>
function updateCodeTag()
{
	let e,s;
	e=document.getElementById("a");
	s=e.innerHTML;
	s=s.replace(/<style./,"<style"+">\n<![CDATA[");
	s=s.replace(/.\/style>/,"]]>\n<"+"/style>");
	s=s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
	document.querySelector('.codeTag').innerHTML=s;
}
function getLangAcjk()
{
	let e=document.querySelector('[name="lang"]:checked');
	return e?e.value:"Ja";
}
function computeRedOne(z,k,km)
{
	return Math.floor(k*z/(km?km:1));
}
function computeRedFinalColor(c,k,km)
{
	let r,g,b,a;
	if (!km) // case of a character that has only one stroke
		return "rgba("+c.r*0.8+","+c.g*0.8+","+c.b*0.8+","+c.a+")";
	r=computeRedOne(c.r,k,km);
	g=computeRedOne(c.g,k,km);
	b=computeRedOne(c.b,k,km);
	a=c.a;
	return "rgba("+r+","+g+","+b+","+a+")";
}
function colorizeStrokesInRed(x)
{
	// set svg attribute instead of style to let apply global css if any
	let km,list,s1="\tfill:none;\n",s2="\tstroke:#000;\n";
	let svg=document.querySelector('#a svg.acjk');
	list=svg.querySelectorAll("path[clip-path]");
	if(list)
	{
		if (x)
		{
			// c is the color of the last stroke
			// can be replaced by any other color, including color with transparency
			let c={r:255,g:0,b:0,a:1},c2,km=list.length,l,lm=0,ms=[];
			// in case of the svg is special, on has to compute the actual stroke number
			for (let k=0;k<km;k++)
			{
				let v=list[k].getAttribute("clip-path");
				let m=v.match(/z[0-9-]+c[0-9]+[b-z]/);
				ms[k]=m;
				if(!m) lm++;
			}
			l=0;
			for (let k=0;k<km;k++)
			{
				if(!ms[k]) {c2=computeRedFinalColor(c,l,lm-1);l++;}
				list[k].setAttributeNS(null,"stroke",c2);
			}
			svg.innerHTML=svg.innerHTML.replace(s2,"");
		}
		else
		{
			for (let e of list) e.removeAttributeNS(null,"stroke");
			svg.innerHTML=svg.innerHTML.replace(s1+"}",s1+s2+"}");
		}
	}
}
function switchRed()
{
	colorizeStrokesInRed(document.querySelector('[name="red"]').checked);
	updateCodeTag();
}
function updateInfo(s)
{
	let d=new Date().getFullYear();
	s=s.replace(/AnimCJK [0-9-]+/,"AnimCJK 2016-"+d);
	return s;
}
function run(s,c,dir)
{
	if(s.match(/<svg[^>]+class="acjk"/))
	{
		s=updateInfo(s);
		s=s.replace(/<style[^@]+@/,"<style"+">\n@");
		s=s.replace(/}[^}]+\/style>/,"}\n<"+"/style>");
		document.getElementById("a").innerHTML=s;
		switchRed();
	}
	else
	{
		s=c+" not found in "+dir;
		document.getElementById("a").innerHTML=s;
	}
}
function doIt()
{
  	let e=document.querySelector('[name="data"]'),c=e.value;
  	document.getElementById("a").innerHTML="";
  	document.querySelector('.codeTag').innerHTML="";
	if(c)
	{
		let dec=c.codePointAt(0);
		e.value=c=String.fromCodePoint(dec);
		if(dec>=11904)
		{
			let lang=getLangAcjk(),dir='svgs'+lang;
			if((lang=="Ja")&&c.match(/^[ぁ-ゟァ-ヿ]$/u)) dir+="Kana";
			fetch('../'+dir+'/'+dec+'.svg',{cache:"no-cache"})
			.then(r=>{if(!r.ok) throw r.statusText; return r.text();})
			.then(r=>run(r,c,dir))
			.catch(e=>run(e,c,dir));
		}
	}
}
window.addEventListener("load",function(){
	let e=document.querySelector('[name="red"]');
	e.checked=true;
	e.addEventListener("click",switchRed);
});
</script>
<script src="_js/selectorAcjk.js"></script>
</body>
</html>
