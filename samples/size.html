<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="Demo to change the size
of a Japanese or Chinese character displayed with an animCJK svg file">
<link rel="stylesheet" href="_css/withSelector.css" type="text/css">
<style>
:root {--size:256;}
.specificSelector
{
	margin:0.5em 0;
	padding:0;
	border:0;
}
#a
{
	display:flex;
	justify-content:center;
	align-items:center;
	margin:0.5em 0;
	padding:0;
}
#a:not(:empty)
{
	width:calc(var(--size) * 1px);
	height:calc(var(--size) * 1px);
	border:1px solid #ccc;
}
#a svg
{
	display:block;
}
pre
{
	border:1px solid #ccc;
	padding:0.125em;
	white-space:pre-wrap;
}
.specificSelector input[name="size"]
{
	font-size:1em;
	display:block;
	width:14em;
	margin:0;
}
.specificSelector #sizeMarks
{
	font-size:1em;
	display:flex;
	margin:0;
	padding:0;
	width:14em;
	justify-content:space-between;
}
.specificSelector #sizeMarks option:not([label]) {display:none;}
.specificSelector #sizeMarks option {width:3em;text-align:center;margin:0;padding:0;}
</style>
<title>AnimCJK Size</title>
<link rel="icon" type="image/svg+xml" href="../animCJKIcon.svg">
</head>
<body>
<h1>AnimCJK Size</h1>
<nav class="link">
<a href="https://github.com/parsimonhi/animCJK"><span>Download</span></a>
<a href="./"><span>Sample selector</span></a>
</nav>
<fieldset class="langSelector"></fieldset>
<fieldset class="dataSelector"></fieldset>
<fieldset class="specificSelector">
<label>
<span>Size:</span>
<input autocomplete="off" name="size" type="range" list="sizeMarks" value="256" step="64" min="64" max="960">
</label>
<datalist id="sizeMarks">
<option value="128" label="128"></option>
<option value="256"></option>
<option value="384"></option>
<option value="512" label="512"></option>
<option value="640"></option>
<option value="768"></option>
<option value="896" label="896"></option>
</datalist>
</fieldset>
<figure id="a"></figure>
<details>
<summary>SVG code</summary>
<pre class="codeTag"></pre>
</details>
<fieldset class="charListSelector"></fieldset>
<footer>
<nav class="link">
<a href="#"><span>Top</span></a>
<a href="./"><span>Sample selector</span></a>
<a href="../licenses/COPYING.txt"><span>Licences</span></a>
</nav>
</footer>
<script>
function updateCodeTag()
{
	let e,s;
	e=document.getElementById("a");
	s=e.innerHTML;
	s=s.replace(/<style./,"<style"+">\n<![CDATA[");
	s=s.replace(/.\/style>/,"]]>\n<"+"/style>");
	s=s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
	document.querySelector('.codeTag').innerHTML=s;
}
function getLangAcjk()
{
	let e=document.querySelector('[name="lang"]:checked');
	return e?e.value:"Ja";
}
function setSize(v)
{
	let svg=document.querySelector('#a svg.acjk');
	if(svg)
	{
		// not necessary since one also sets the container width and height
		// but set them in case on uses the svg alone later
		svg.setAttribute("width",v);
		svg.setAttribute("height",v);
	}
	// set --size since one needs to set width and height of the container
	// in case of an error message is displayed inside it
	document.documentElement.style.setProperty("--size",v);
}
function switchSize()
{
	let size=document.querySelector('[name="size"]').value;
	setSize(size);
	updateCodeTag();
}
function updateInfo(s)
{
	let d=new Date().getFullYear();
	s=s.replace(/AnimCJK [0-9-]+/,"AnimCJK 2016-"+d);
	return s;
}
function run(s,c,dir)
{
	if(s.match(/<svg[^>]+class="acjk"/))
	{
		s=updateInfo(s);
		s=s.replace(/<style[^@]+@/,"<style"+">\n@");
		s=s.replace(/}[^}]+\/style>/,"}\n<"+"/style>");
		document.getElementById("a").innerHTML=s;
		switchSize();
	}
	else
	{
		s=c+" not found in "+dir;
		document.getElementById("a").innerHTML=s;
	}
}
function doIt()
{
  	let e=document.querySelector('[name="data"]'),c=e.value;
  	document.getElementById("a").innerHTML="";
  	document.querySelector('.codeTag').innerHTML="";
	if(c)
	{
		let dec=c.codePointAt(0);
		e.value=c=String.fromCodePoint(dec);
		if(dec>=11904)
		{
			let lang=getLangAcjk(),dir='svgs'+lang;
			if((lang=="Ja")&&c.match(/^[ぁ-ゟァ-ヿ]$/u)) dir+="Kana";
			fetch('../'+dir+'/'+dec+'.svg',{cache:"no-cache"})
			.then(r=>{if(!r.ok) throw r.statusText; return r.text();})
			.then(r=>run(r,c,dir))
			.catch(e=>run(e,c,dir));
		}
	}
}
window.addEventListener("load",function(){
	let e=document.querySelector('[name="size"]');
	if(e) e.addEventListener("change",switchSize);
});
</script>
<script src="_js/selectorAcjk.js"></script>
</body>
</html>
