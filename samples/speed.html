<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="Demo to change the speed ot the animation
of a Japanese or Chinese character displayed with an animCJK svg file">
<link rel="stylesheet" href="_css/withSelector.css" type="text/css">
<style>
.specificSelector
{
	margin:0.5em 0;
	padding:0;
	border:0;
}
.specificSelector input[name="speed"]
{
	display:block;
}
#a
{
	display:flex;
	justify-content:center;
	align-items:center;
	width:16em;
	height:16em;
	border:1px solid #ccc;
	margin:0.5em 0;
	padding:0;
}
#a svg
{
	display:block;
}
pre
{
	border:1px solid #ccc;
	padding:0.125em;
	white-space:pre-wrap;
}
</style>
<title>AnimCJK Speed</title>
<link rel="icon" type="image/svg+xml" href="../animCJKIcon.svg">
</head>
<body>
<h1>AnimCJK Speed</h1>
<nav class="link">
<a href="https://github.com/parsimonhi/animCJK"><span>Download</span></a>
<a href="./"><span>Sample selector</span></a>
</nav>
<fieldset class="langSelector"></fieldset>
<fieldset class="dataSelector"></fieldset>
<fieldset class="specificSelector">
<label>Speed:
<input type="range" name="speed" list="sizeMarks" min="0" max="256" step="16" value="128">
<datalist id="sizeMarks">
<option value="0"></option>
<option value="64"></option>
<option value="128"></option>
<option value="192"></option>
<option value="256"></option>
</datalist>
</label>
</fieldset>
<figure id="a"></figure>
<details>
<summary>SVG code</summary>
<pre class="codeTag"></pre>
</details>
<fieldset class="charListSelector"></fieldset>
<footer>
<nav class="link">
<a href="#"><span>Top</span></a>
<a href="./"><span>Sample selector</span></a>
<a href="../licenses/COPYING.txt"><span>Licences</span></a>
</nav>
</footer>
<script>
function updateCodeTag()
{
	let e,s;
	e=document.getElementById("a");
	s=e.innerHTML;
	s=s.replace(/<style./,"<style"+">\n<![CDATA[");
	s=s.replace(/.\/style>/,"]]>\n<"+"/style>");
	s=s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
	document.querySelector('.codeTag').innerHTML=s;
}
function getLangAcjk()
{
	let e=document.querySelector('[name="lang"]:checked');
	return e?e.value:"Ja";
}
function round(n,p=1)
{
	let m=1;
	for(let k=0;k<p;k++) m=m*10;
	return Math.round(n*m)/m;
}
function setSpeed(alpha)
{
	let new_speed;
	new_speed=round(8-Math.log2(alpha),1);
	new_speed=Math.max(Math.min(new_speed,8),0.05);
	let e=document.querySelector("#a svg.acjk");
	if(e)
	{
		let s=e.innerHTML,s2="";
		s2+="\t--t:0.8s;\n";
		s2+="\t--k:"+new_speed+";\n";
		s2+="\t--t2:calc(var(--k) * var(--t));\n";
		s2+="\t--d2:calc(var(--k) * (var(--d) - 1s) + 1s);\n";
		s2+="\tanimation:zk var(--t2) linear forwards var(--d2);\n";
		s=s.replace(/\t--t[^}]+animation[^}]+\(--d2?\);\n/,s2);
		e.innerHTML=s;
	}
}
function switchSpeed()
{
	setSpeed(-(-document.querySelector('[name="speed"]').value));
	updateCodeTag();
}
function restartAnime()
{
	// force a reflow to restart animation
	let e=document.querySelector("svg.acjk");
	if(e)
	{
		let s=e.innerHTML;
		e.innerHTML="";
		e.innerHTML=s;
	}
}
function updateInfo(s)
{
	let d=new Date().getFullYear();
	s=s.replace(/AnimCJK [0-9-]+/,"AnimCJK 2016-"+d);
	return s;
}
function run(s,c,dir,msg)
{
	if(s.match(/<svg[^>]+class="acjk"/))
	{
		s=updateInfo(s);
		s=s.replace(/<style[^@]+@/,"<style"+">\n@");
		s=s.replace(/}[^}]+\/style>/,"}\n<"+"/style>");
		document.getElementById("a").innerHTML=s;
		switchSpeed();
	}
	else
	{
		s=c+" not found in "+dir;
		document.getElementById("a").innerHTML=s;
	}
}
function doIt()
{
  	let e=document.querySelector('[name="data"]'),c=e.value;
  	document.getElementById("a").innerHTML="";
  	document.querySelector('.codeTag').innerHTML="";
	if(c)
	{
		let dec=c.codePointAt(0);
		e.value=c=String.fromCodePoint(dec);
		if(dec>=11904)
		{
			let lang=getLangAcjk(),dir='svgs'+lang;
			if((lang=="Ja")&&c.match(/^[ぁ-ゟァ-ヿ]$/u)) dir+="Kana";
			fetch('../'+dir+'/'+dec+'.svg',{cache:"no-cache"})
			.then(r=>{if(!r.ok) throw r.statusText; return r.text();})
			.then(r=>run(r,c,dir,"1"))
			.catch(e=>run(e,c,dir,"2"));
		}
	}
}
window.addEventListener("load",function(){
	let e=document.querySelector('[name="speed"]');
	e.addEventListener("change",function(){switchSpeed();restartAnime();});
});
</script>
<script src="_js/selectorAcjk.js"></script>
</body>
</html>
